{{ $page := .page }}
{{ $class := .class }}

{{- if $page.IsTranslated -}}
  <div class="flex justify-items-start {{ with $class }}{{ . | safeCSS }}{{ end }}">
    {{ range $page.Translations }}
      {{ $label := index (dict "en" "English" "zh" "中文") .Lang | default (index hugo.Data.languages .Lang) | default .Lang }}
      <a
        href="{{ .Permalink }}"
        hreflang="{{ .Lang }}"
        class="inline-flex h-7 items-center rounded-md px-2 text-xs font-medium text-gray-600 transition-colors dark:text-gray-400 hover:bg-gray-100 hover:text-gray-900 dark:hover:bg-primary-100/5 dark:hover:text-gray-50"
        aria-label="Switch language to {{ $label }}"
      >
        {{ $label }}
      </a>
    {{ end }}
  </div>
{{- end -}}
